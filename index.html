        .desktop-layout {

        .shop-list {

        .shop-item:hover {

        .shop-item.active {

            box-shadow: 0 0 20px rgba(255,0,128,0.6);
        }
        .marker-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 9px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);

        .stats {

            justify-content: center;
            gap: 32px;
            padding: 16px;
            border-top: 1px solid #eee;
            background: #fafafa;

        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px;
        }

            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 16px;
            max-width: 600px;
            max-height: 80vh;
            width: 90%;
            overflow: hidden;
            display: flex;
            flex-direction: column;

            to { opacity: 1; transform: scale(1); }
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(0,0,0,0.5);
            color: white;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
        }
        .image-slider {
            position: relative;
            height: 280px;
            background: #f3f4f6;
            flex-shrink: 0;
            max-height: 50vh;
        }
        .slider-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .slider-nav {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .slider-dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            cursor: pointer;
        }
        .slider-dot.active {
            background: white;
        }
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(0,0,0,0.5);
            color: white;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        .slider-arrow.next { right: 12px; }

        }
        .modal-header {
            margin-bottom: 16px;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .modal-categories {
            display: flex;
            gap: 8px;
        }

            background: #e0e7ff;

            border-radius: 20px;
            font-size: 13px;

        .modal-info-icon {
            font-size: 18px;
        }
        .modal-info-text {
            font-size: 14px;
            color: #374151;
        }
        .nav-button {

            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;

            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            z-index: 200;
            align-items: center;
            justify-content: center;

        .image-zoom-overlay.active {

        }

            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border: none;

            color: white;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;

            max-height: 90vh;

        }

            to { opacity: 1; transform: scale(1); }
        }

            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;

        .image-zoom-nav.prev { left: 20px; }
        .image-zoom-nav.next { right: 20px; }

        }
        .nav-options-header h3 {

        }
        .nav-options-close {

            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }
        .nav-options-list {
            padding: 12px;
        }
        .nav-option-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-radius: 12px;

            transition: background 0.3s;
        }
        .nav-option-item:hover {
            background: #f3f4f6;
        }
        .nav-option-icon {

            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 12px;

            font-size: 15px;

        .nav-option-desc {
            font-size: 13px;
            color: #6b7280;
            margin-top: 2px;
        }
        .nav-option-arrow {
            color: #9ca3af;
            font-size: 18px;
        }

            flex-direction: column;

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }

            font-size: 20px;

        .mobile-stats {

            flex: 1;
            padding: 12px;

            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .mobile-nav-btn.secondary {
            background: #f3f4f6;
            color: #374151;
        }

        /* 响应式 */
        @media screen and (max-width: 768px) {
            .desktop-layout { display: none; }

            }
            .image-slider {

        function setupMobileMapZoom() {
            if (!mobileMapWrapper) return;
            
            const mapImg = document.getElementById('mobileMapImage');
            if (!mapImg) return;
            
            let currentScale = 1;
            let lastTouchDistance = 0;
            let startX = 0;
            let startY = 0;
            let translateX = 0;
            let translateY = 0;
            let isDragging = false;
            let isZooming = false;
            
            mobileMapWrapper.addEventListener('touchstart', function(e) {
                if (e.touches.length === 1) {
                    isDragging = true;
                    isZooming = false;
                    startX = e.touches[0].clientX - translateX;
                    startY = e.touches[0].clientY - translateY;
                } else if (e.touches.length === 2) {
                    isZooming = true;
                    isDragging = false;
                    lastTouchDistance = getDistance(e.touches[0], e.touches[1]);
                }
            });
            
            mobileMapWrapper.addEventListener('touchmove', function(e) {
                if (isDragging && e.touches.length === 1) {
                    e.preventDefault();
                    if (currentScale > 1) {
                        const newTranslateX = e.touches[0].clientX - startX;
                        const newTranslateY = e.touches[0].clientY - startY;
                        
                        const mapWidth = mapImg.offsetWidth;
                        const mapHeight = mapImg.offsetHeight;
                        const maxTranslateX = (mapWidth * currentScale - mapWidth) / 2;
                        const maxTranslateY = (mapHeight * currentScale - mapHeight) / 2;
                        
                        translateX = Math.max(-maxTranslateX, Math.min(maxTranslateX, newTranslateX));
                        translateY = Math.max(-maxTranslateY, Math.min(maxTranslateY, newTranslateY));
                        
                        updateMobileMapTransform();
                    }
                } else if (isZooming && e.touches.length === 2) {
                    e.preventDefault();
                    const distance = getDistance(e.touches[0], e.touches[1]);
                    const scaleChange = distance / lastTouchDistance;
                    const newScale = Math.max(1, Math.min(3, currentScale * scaleChange));
                    
                    if (Math.abs(newScale - currentScale) > 0.01) {
                        const touchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const touchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        
                        translateX = touchMidX - (touchMidX - translateX) * (newScale / currentScale);
                        translateY = touchMidY - (touchMidY - translateY) * (newScale / currentScale);
                        currentScale = newScale;
                        
                        const mapWidth = mapImg.offsetWidth;
                        const mapHeight = mapImg.offsetHeight;
                        const maxTranslateX = (mapWidth * currentScale - mapWidth) / 2;
                        const maxTranslateY = (mapHeight * currentScale - mapHeight) / 2;
                        
                        translateX = Math.max(-maxTranslateX, Math.min(maxTranslateX, translateX));
                        translateY = Math.max(-maxTranslateY, Math.min(maxTranslateY, translateY));
                        
                        updateMobileMapTransform();
                    }
                    lastTouchDistance = distance;
                }
            });
            
            mobileMapWrapper.addEventListener('touchend', function() {
                isDragging = false;
                isZooming = false;
            });
            
            function getDistance(touch1, touch2) {
                const dx = touch2.clientX - touch1.clientX;
                const dy = touch2.clientY - touch1.clientY;
                return Math.sqrt(dx * dx + dy * dy);
            }
            
            function updateMobileMapTransform() {
                mobileMapWrapper.style.transform = `scale(${currentScale}) translate(${translateX / currentScale}px, ${translateY / currentScale}px)`;
                updateMobileMarkers();
            }
            
            function updateMobileMarkers() {
                const markers = document.querySelectorAll('#mobileMapWrapper .marker');
                markers.forEach(marker => {
                    const x = parseFloat(marker.dataset.origX);
                    const y = parseFloat(marker.dataset.origY);
                    const markerSize = 16 * currentScale;
                    
                    marker.style.left = (x * currentScale + translateX - markerSize / 2) + 'px';
                    marker.style.top = (y * currentScale + translateY - markerSize / 2) + 'px';
                    marker.style.width = markerSize + 'px';
                    marker.style.height = markerSize + 'px';
                    marker.style.borderRadius = '50%';
                    marker.style.transform = 'none';
                });
            }
            
            window.updateMobileMapScale = function(scale) {
                currentScale = scale;
                updateMobileMapTransform();
            };
        }

        function getCategories() {
            const cats = new Set();
            shopData.shops.forEach(shop => {
                shop.category.forEach(cat => cats.add(cat));
            });
            return Array.from(cats);
        }

        function renderFilters(type) {
            const container = document.getElementById(type === 'desktop' ? 'filterTabs' : 'mobileFilterTabs');
            const categories = getCategories();
            categories.forEach(cat => {
                const tab = document.createElement('div');
                tab.className = 'filter-tab';
                tab.textContent = cat;
                tab.dataset.category = cat;
                tab.onclick = function() {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.category;
                    renderShopList(type);
                    renderMarkers(type);
                };
                container.appendChild(tab);
            });
        }

        function renderMarkers(type) {
            const wrapper = document.getElementById(type === 'desktop' ? 'mapWrapper' : 'mobileMapWrapper');
            const existingMarkers = wrapper.querySelectorAll('.marker');
            existingMarkers.forEach(m => m.remove());
            
            const scale = type === 'desktop' ? desktopImageScale : mobileImageScale;
            const filtered = currentFilter === 'all' 
                ? shopData.shops 
                : shopData.shops.filter(shop => shop.category.includes(currentFilter));
            
            filtered.forEach((shop, idx) => {
                const marker = document.createElement('div');
                marker.className = 'marker';
                const x = shop.mapPosition.x * scale;
                const y = shop.mapPosition.y * scale;
                marker.style.left = x + 'px';
                marker.style.top = y + 'px';
                marker.dataset.origX = x;
                marker.dataset.origY = y;
                marker.dataset.shopId = shop.id;
                marker.title = shop.name;
                marker.innerHTML = `<div class="marker-number">${idx + 1}</div>`;
                marker.onclick = function() {
                    showShopDetail(shop.id);
                };
                wrapper.appendChild(marker);
            });
        }

        function showShopDetail(id) {
            currentShop = shopData.shops.find(shop => shop.id === id);
            if (!currentShop) return;
            
            document.getElementById('modalTitle').textContent = currentShop.name;
            
            const cats = document.getElementById('modalCategories');
            cats.innerHTML = currentShop.category.map(cat => `
                <span class="modal-category">${cat}</span>
            `).join('');
            
            document.getElementById('modalDescription').innerHTML = currentShop.description;
            document.getElementById('modalAddress').textContent = currentShop.address;
            
            // 渲染图片
            const imageSlider = document.getElementById('imageSlider');
            if (currentShop.images.length > 0) {
                imageSlider.innerHTML = `
                    <img class="slider-image" src="${currentShop.images[0]}" alt="${currentShop.name}" onclick="openImageZoom()" style="cursor: zoom-in;">
                `;
            } else {
                imageSlider.innerHTML = `
                    <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:14px;">
                        暂无图片
                    </div>
                `;
            }
            
            document.querySelectorAll('.marker').forEach(m => m.classList.remove('active'));
            document.querySelectorAll(`[data-shop-id="${id}"]`).forEach(el => el.classList.add('active'));
            
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function openImageZoom() {
            if (!currentShop || currentShop.images.length === 0) return;
            const zoomOverlay = document.getElementById('imageZoomOverlay');
            const zoomContent = document.getElementById('imageZoomContent');
            
            zoomContent.src = currentShop.images[0];
            zoomContent.alt = currentShop.name;
            zoomOverlay.classList.add('active');
        }

        function closeImageZoom() {
            document.getElementById('imageZoomOverlay').classList.remove('active');
        }

        function showNavOptions() {
            if (!currentShop) return;
            
            const navOptionsList = document.getElementById('navOptionsList');
            
            const navOptions = [
                {
                    id: 'amap',
                    name: '高德地图',
                    desc: '国内导航首选',
                    icon: '🗺️',
                    url: currentShop.navUrl
                },
                {
                    id: 'baidu',
                    name: '百度地图',
                    desc: '另一个流行选择',
                    icon: '📍',
                    url: currentShop.baiduNavUrl
                }
            ];
            
            navOptionsList.innerHTML = navOptions.map(opt => `
                <div class="nav-option-item" onclick="openNav('${opt.id}')">
                    <div class="nav-option-icon ${opt.id}">${opt.icon}</div>
                    <div class="nav-option-info">
                        <div class="nav-option-name">${opt.name}</div>
                        <div class="nav-option-desc">${opt.desc}</div>
                    </div>
                    <div class="nav-option-arrow">→</div>
                </div>
            `).join('');
            
            window.currentNavOptions = navOptions;
            
            document.getElementById('navOptionsOverlay').classList.add('active');
        }

        function closeNavOptions() {
            document.getElementById('navOptionsOverlay').classList.remove('active');
        }

        function openNav(id) {
            const options = window.currentNavOptions;
            const opt = options.find(o => o.id === id);
            if (opt) {
                window.open(opt.url, '_blank');
            }
            closeNavOptions();
        }

        function updateStats() {
            document.getElementById('totalShops').textContent = shopData.total;
            document.getElementById('totalCats').textContent = getCategories().length;
        }

        function updateMobileStats() {
            document.getElementById('mobileTotalShops').textContent = shopData.total;
            document.getElementById('mobileTotalCats').textContent = getCategories().length;
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleMapList() {
            isMobileListView = !isMobileListView;
            const btnText = document.getElementById('toggleBtnText');
            btnText.textContent = isMobileListView ? '地图视图' : '店铺列表';
            
            const mapContainers = document.querySelectorAll('.mobile-layout .map-container');
            const shopLists = document.querySelectorAll('.mobile-shop-list');
            
            if (isMobileListView) {
                mapContainers.forEach(m => m.style.display = 'none');
                shopLists.forEach(s => s.style.display = 'block');
            } else {
                mapContainers.forEach(m => m.style.display = 'block');
                shopLists.forEach(s => s.style.display = 'block');
            }
        }

        function renderShopList(type) {
            const list = document.getElementById(type === 'desktop' ? 'shopList' : 'mobileShopList');
            if (!list) {
                console.error('Shop list container not found:', type);
                return;
            }
            if (!shopData || !shopData.shops) {
                console.error('shopData is not defined');
                list.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;">数据加载失败</div>';
                return;
            }
            const filtered = currentFilter === 'all' 
                ? shopData.shops 
                : shopData.shops.filter(shop => shop.category.includes(currentFilter));
            
            if (filtered.length === 0) {
                list.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;">没有找到店铺</div>';
                return;
            }
            
            list.innerHTML = filtered.map((shop, idx) => {
                const brief = shop.description.replace(/<[^>]*>/g, '').substring(0, 80) + '...';
                return `
                    <div class="shop-item" data-shop-id="${shop.id}" onclick="showShopDetail('${shop.id}')">
                        <div class="shop-name">${idx + 1}. ${shop.name}</div>
                        <span class="shop-category">${shop.category[0]}</span>
                        <div class="shop-brief">${brief}</div>
                    </div>
                `;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', init);
        </script>
</body>
</html>
