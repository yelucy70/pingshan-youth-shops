<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坪山区青春小店 - 地标标注工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            height: 100vh;
            background: #f5f7fa;
        }
        .map-container {
            flex: 1;
            overflow: auto;
            position: relative;
            background: #333;
        }
        .map-wrapper {
            transform-origin: top left;
            position: relative;
            display: inline-block;
        }
        #mapImage {
            display: block;
            max-width: none;
            cursor: crosshair;
        }
        .zoom-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .zoom-btn {
            width: 44px;
            height: 44px;
            background: white;
            border: none;
            border-radius: 8px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zoom-btn:hover {
            background: #f0f0f0;
        }
        .zoom-level {
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .sidebar {
            width: 320px;
            background: white;
            border-left: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }
        .sidebar-header h2 {
            font-size: 18px;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .sidebar-header p {
            font-size: 13px;
            color: #666;
        }
        .shop-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .shop-item {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .shop-item:hover {
            background: #f5f7fa;
        }
        .shop-item.selected {
            background: #e8f0fe;
            border: 1px solid #4a90d9;
        }
        .shop-number {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .shop-info {
            flex: 1;
            min-width: 0;
        }
        .shop-name {
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .shop-category {
            font-size: 11px;
            color: #667eea;
            margin-top: 2px;
        }
        .actions {
            padding: 16px;
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .progress {
            text-align: center;
            font-size: 13px;
            color: #666;
            padding: 10px;
            background: #f5f7fa;
            border-radius: 8px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
        .btn-secondary:hover {
            background: #e8e8e8;
            box-shadow: none;
        }
        .marker {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #ff0080 0%, #ff4081 100%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(255, 0, 128, 0.6);
        }
        .marker:hover {
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.8);
        }
        .marker.selected {
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 15px rgba(255, 0, 128, 1);
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 0, 128, 1); }
            50% { box-shadow: 0 0 25px rgba(255, 0, 128, 0.6); }
        }
        .marker-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 10px;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div class="map-container">
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="zoomIn()">+</button>
            <button class="zoom-btn" onclick="zoomOut()">−</button>
            <button class="zoom-btn" onclick="resetZoom()">🔄</button>
            <div class="zoom-level" id="zoomLevel">100%</div>
        </div>
        <div class="map-wrapper" id="mapWrapper">
            <img id="mapImage" src="坪山区青春小店消费图鉴地图.jpg" alt="坪山区青春小店消费图鉴">
        </div>
    </div>
    
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>📍 地标标注工具</h2>
            <p>点击地图上的位置进行标注</p>
        </div>
        
        <div class="shop-list" id="shopList"></div>
        
        <div class="actions">
            <div class="progress" id="progress">已标注 0 / 30</div>
            <button class="btn" onclick="saveData()">💾 保存坐标数据</button>
            <button class="btn btn-secondary" onclick="clearMarkers()">🔄 清除所有标记</button>
        </div>
    </div>

    <script>
        let currentScale = 1;
        const minScale = 0.5;
        const maxScale = 3;
        let selectedShopId = null;
        
        const shopData = {
            "total": 30,
            "shops": [
                {"id": "001", "name": "BasilBistro罗勒", "category": ["餐饮美食"], "mapPosition": {"x": 2667, "y": 3069}},
                {"id": "002", "name": "六合空间烤吧", "category": ["餐饮美食"], "mapPosition": {"x": 3267, "y": 2672}},
                {"id": "003", "name": "鹏鹏虾庄·创新土鸡火锅", "category": ["餐饮美食"], "mapPosition": {"x": 2876, "y": 2692}},
                {"id": "004", "name": "深圳市坪山区原野西餐厅", "category": ["餐饮美食"], "mapPosition": {"x": 3511, "y": 3173}},
                {"id": "005", "name": "福源居", "category": ["娱乐休闲"], "mapPosition": {"x": 4889, "y": 3849}},
                {"id": "006", "name": "火车头live", "category": ["娱乐休闲"], "mapPosition": {"x": 3096, "y": 2844}},
                {"id": "007", "name": "又见咖啡工作室", "category": ["咖啡甜品"], "mapPosition": {"x": 3947, "y": 3883}},
                {"id": "008", "name": "开心爸爸面包店", "category": ["咖啡甜品"], "mapPosition": {"x": 4211, "y": 2430}},
                {"id": "009", "name": "Somethingfor创新广场店", "category": ["咖啡甜品"], "mapPosition": {"x": 3092, "y": 2472}},
                {"id": "010", "name": "知亦cake＆cafe", "category": ["咖啡甜品"], "mapPosition": {"x": 3086, "y": 3303}},
                {"id": "011", "name": "许愿甜点", "category": ["咖啡甜品"], "mapPosition": {"x": 2684, "y": 3275}},
                {"id": "012", "name": "墩宝糖水铺", "category": ["咖啡甜品"], "mapPosition": {"x": 2227, "y": 3501}},
                {"id": "013", "name": "甜满满甜汤", "category": ["咖啡甜品"], "mapPosition": {"x": 2861, "y": 3384}},
                {"id": "014", "name": "叁点叁小吃店", "category": ["餐饮美食"], "mapPosition": {"x": 4036, "y": 1771}},
                {"id": "015", "name": "江岭三河（编织咖啡馆）", "category": ["咖啡甜品"], "mapPosition": {"x": 3752, "y": 3784}},
                {"id": "016", "name": "树下陶", "category": ["娱乐休闲"], "mapPosition": {"x": 3274, "y": 2957}},
                {"id": "017", "name": "夕空间", "category": ["娱乐休闲"], "mapPosition": {"x": 4351, "y": 2883}},
                {"id": "018", "name": "花房柴窑面包坊", "category": ["娱乐休闲"], "mapPosition": {"x": 4558, "y": 3927}},
                {"id": "019", "name": "艺海时光·小院", "category": ["娱乐休闲"], "mapPosition": {"x": 4476, "y": 2579}},
                {"id": "020", "name": "南风知衣汉服体验", "category": ["娱乐休闲"], "mapPosition": {"x": 3209, "y": 3145}},
                {"id": "021", "name": "荷糖悦品", "category": ["咖啡甜品"], "mapPosition": {"x": 4090, "y": 2782}},
                {"id": "022", "name": "吖咪艺树园", "category": ["娱乐休闲"], "mapPosition": {"x": 3280, "y": 3442}},
                {"id": "023", "name": "去峦山", "category": ["娱乐休闲"], "mapPosition": {"x": 2946, "y": 4338}},
                {"id": "024", "name": "New tennis新网网球馆", "category": ["娱乐休闲"], "mapPosition": {"x": 2883, "y": 3177}},
                {"id": "025", "name": "舒昕瑜伽馆", "category": ["娱乐休闲"], "mapPosition": {"x": 4403, "y": 1204}},
                {"id": "026", "name": "隐归叁舍民宿", "category": ["特色民宿"], "mapPosition": {"x": 5171, "y": 3757}},
                {"id": "027", "name": "粤口口腔", "category": ["生活服务"], "mapPosition": {"x": 3568, "y": 2392}},
                {"id": "028", "name": "未来隽才大椿堂中医诊所", "category": ["生活服务"], "mapPosition": {"x": 4465, "y": 2264}},
                {"id": "029", "name": "云沁盲人推拿中心", "category": ["生活服务"], "mapPosition": {"x": 2912, "y": 2954}},
                {"id": "030", "name": "HAKKA 客咖 Cafe&Bar", "category": ["咖啡甜品"], "mapPosition": {"x": 4538, "y": 1350}}
            ]
        };

        function init() {
            renderShopList();
            renderMarkers();
            document.getElementById('mapImage').addEventListener('click', handleMapClick);
        }

        function renderShopList() {
            const list = document.getElementById('shopList');
            list.innerHTML = shopData.shops.map((shop, idx) => `
                <div class="shop-item" data-id="${shop.id}" onclick="selectShop('${shop.id}')">
                    <div class="shop-number">${idx + 1}</div>
                    <div class="shop-info">
                        <div class="shop-name">${shop.name}</div>
                        <div class="shop-category">${shop.category[0]}</div>
                    </div>
                </div>
            `).join('');
            updateProgress();
        }

        function selectShop(shopId) {
            selectedShopId = shopId;
            
            document.querySelectorAll('.shop-item').forEach(item => {
                item.classList.toggle('selected', item.dataset.id === shopId);
            });
            
            document.querySelectorAll('.marker').forEach(m => {
                m.classList.toggle('selected', m.dataset.id === shopId);
            });
            
            const shop = shopData.shops.find(s => s.id === shopId);
            if (shop && shop.mapPosition.x > 0) {
                const wrapper = document.getElementById('mapWrapper');
                const x = shop.mapPosition.x * currentScale - window.innerWidth / 3;
                const y = shop.mapPosition.y * currentScale - window.innerHeight / 2;
                wrapper.scrollTo({ left: x, top: y, behavior: 'smooth' });
            }
        }

        function renderMarkers() {
            const wrapper = document.getElementById('mapWrapper');
            const existingMarkers = wrapper.querySelectorAll('.marker');
            existingMarkers.forEach(m => m.remove());
            
            shopData.shops.forEach((shop, idx) => {
                if (shop.mapPosition.x > 0) {
                    const marker = document.createElement('div');
                    marker.className = 'marker';
                    marker.dataset.id = shop.id;
                    marker.style.left = (shop.mapPosition.x * currentScale) + 'px';
                    marker.style.top = (shop.mapPosition.y * currentScale) + 'px';
                    marker.innerHTML = `<div class="marker-number">${idx + 1}</div>`;
                    marker.addEventListener('click', (e) => {
                        e.stopPropagation();
                        selectShop(shop.id);
                    });
                    marker.addEventListener('mouseenter', () => {
                        showTooltip(marker, shop.name);
                    });
                    marker.addEventListener('mouseleave', hideTooltip);
                    wrapper.appendChild(marker);
                }
            });
        }

        let tooltip = null;
        function showTooltip(element, text) {
            hideTooltip();
            tooltip = document.createElement('div');
            tooltip.className = 'tooltip';
            tooltip.textContent = text;
            document.body.appendChild(tooltip);
            
            const rect = element.getBoundingClientRect();
            tooltip.style.left = (rect.left - tooltip.offsetWidth / 2 + rect.width / 2) + 'px';
            tooltip.style.top = (rect.top - tooltip.offsetHeight - 10) + 'px';
        }

        function hideTooltip() {
            if (tooltip) {
                tooltip.remove();
                tooltip = null;
            }
        }

        function handleMapClick(e) {
            if (!selectedShopId) {
                alert('请先在右侧列表中选择一个店铺');
                return;
            }
            
            const rect = document.getElementById('mapImage').getBoundingClientRect();
            const x = (e.clientX - rect.left) / currentScale;
            const y = (e.clientY - rect.top) / currentScale;
            
            const shop = shopData.shops.find(s => s.id === selectedShopId);
            if (shop) {
                shop.mapPosition.x = Math.round(x);
                shop.mapPosition.y = Math.round(y);
                renderMarkers();
                updateProgress();
                alert(`已标注: ${shop.name}\n坐标: (${shop.mapPosition.x}, ${shop.mapPosition.y})`);
            }
        }

        function zoomIn() {
            if (currentScale < maxScale) {
                currentScale += 0.1;
                updateScale();
            }
        }

        function zoomOut() {
            if (currentScale > minScale) {
                currentScale -= 0.1;
                updateScale();
            }
        }

        function resetZoom() {
            currentScale = 1;
            updateScale();
        }

        function updateScale() {
            const wrapper = document.getElementById('mapWrapper');
            wrapper.style.transform = `scale(${currentScale})`;
            document.getElementById('zoomLevel').textContent = Math.round(currentScale * 100) + '%';
            renderMarkers();
        }

        function updateProgress() {
            const count = shopData.shops.filter(s => s.mapPosition.x > 0).length;
            document.getElementById('progress').textContent = `已标注 ${count} / ${shopData.total}`;
        }

        function clearMarkers() {
            shopData.shops.forEach(shop => {
                shop.mapPosition.x = 0;
                shop.mapPosition.y = 0;
            });
            renderMarkers();
            updateProgress();
            selectedShopId = null;
            document.querySelectorAll('.shop-item').forEach(item => item.classList.remove('selected'));
        }

        function saveData() {
            const output = shopData.shops.map(shop => ({
                id: shop.id,
                name: shop.name,
                mapPosition: shop.mapPosition
            }));
            
            const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'shop_coordinates.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('坐标数据已保存！\n请将生成的JSON文件内容更新到index.html中');
        }

        init();
    </script>
</body>
</html>
